version: '3.9'

services:
  web:
    build: .
    ports:
      - "8000:8000"
    env_file:
      - .env
    depends_on:
      - redis
    volumes:
      - .:/app
    command: python manage.py runserver 0.0.0.0:8000

  celery:
    build: .
    env_file:
      - .env
    depends_on:
      - redis
    command: celery -A kolliq worker -l info

  celery-beat:
    build: .
    env_file:
      - .env
    depends_on:
      - redis
    command: celery -A kolliq beat -l info --scheduler django_celery_beat.schedulers:DatabaseScheduler

  redis:
    image: redis:7-alpine
    ports:
      - "6379:6379"