# ══════════════════════════════════════════════════════════════════
# Kolliq — Test Runner Docker Compose
# Runs pytest in an isolated environment with a local test database
# Does NOT connect to Supabase — uses local Postgres instead
#
# Usage:
#   docker-compose -f docker-compose.test.yml up --build --abort-on-container-exit
#   docker-compose -f docker-compose.test.yml down -v
# ══════════════════════════════════════════════════════════════════

version: '3.9'

services:

  # ── Test database (local Postgres — never Supabase for tests) ──
  test-db:
    image: postgres:15-alpine
    container_name: kolliq-test-db
    environment:
      POSTGRES_DB: kolliq_test
      POSTGRES_USER: kolliq
      POSTGRES_PASSWORD: kolliq_test_password
    ports:
      - "5433:5432"    # 5433 so it doesn't conflict with any local Postgres
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U kolliq -d kolliq_test"]
      interval: 5s
      timeout: 5s
      retries: 10
    networks:
      - test-net
    tmpfs:
      - /var/lib/postgresql/data    # in-memory — fast, no persistence needed

  # ── Test Redis ────────────────────────────────────────────────
  test-redis:
    image: redis:7.2-alpine
    container_name: kolliq-test-redis
    command: redis-server --save ""    # no persistence for tests
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 3s
      retries: 5
    networks:
      - test-net

  # ── Test runner ───────────────────────────────────────────────
  test-runner:
    build:
      context: .
      dockerfile: Dockerfile
      target: builder    # use builder stage — has all dev deps
    container_name: kolliq-test-runner
    environment:
      # Override all external services with test versions
      DATABASE_URL: postgresql://kolliq:kolliq_test_password@test-db:5432/kolliq_test
      REDIS_URL: redis://test-redis:6379/0
      DJANGO_SETTINGS_MODULE: kolliq.settings

      # Dummy values — Squad/AT not called in unit tests (mocked)
      SECRET_KEY: test-secret-key-not-real-just-for-tests-minimum-50-chars
      DEBUG: "True"
      ALLOWED_HOSTS: "*"
      SQUAD_SECRET_KEY: sandbox_sk_test_dummy_key
      SQUAD_PUBLIC_KEY: sandbox_pk_test_dummy_key
      SQUAD_BASE_URL: https://sandbox-api-d.squadco.com
      SQUAD_MERCHANT_ID: SBTEST001
      SQUAD_BENEFICIARY_ACCOUNT: "0000000000"
      KOLLIQ_ESCROW_VIRTUAL_ACCOUNT: "0123456789"
      KOLLIQ_ESCROW_CUSTOMER_ID: kolliq-escrow-test
      KOLLIQ_PLATFORM_VIRTUAL_ACCOUNT: "9876543210"
      KOLLIQ_PLATFORM_CUSTOMER_ID: kolliq-platform-test
      AT_USERNAME: sandbox
      AT_API_KEY: test_at_key
      AT_SENDER_ID: KOLLIQ
      PLATFORM_FEE_PERCENT: "5"
      ARISE_WALLET_ID: "1"
      DEMO_FLOAT_WALLET_ID: "2"
      SAVINGS_SCORE_THRESHOLD: "20"
      LOAN_SCORE_THRESHOLD: "50"
      INSURANCE_SCORE_THRESHOLD: "70"
      LOAN_INTEREST_RATE_MONTHLY: "5.0"
      INSURANCE_DAILY_PREMIUM: "200"
      INSURANCE_COVERAGE_LIMIT: "50000"
      SAVINGS_ANNUAL_INTEREST_RATE: "5.0"
      FINANCIAL_PARTNER_MODE: simulated
      PARTNER_API_SECRET: test-partner-secret
      INTERNAL_WEBHOOK_SECRET: test-internal-secret
    volumes:
      - .:/app
    command: >
      sh -c "
        echo '⏳ Waiting for test database...' &&
        python manage.py wait_for_db &&
        echo '📦 Running migrations on test DB...' &&
        python manage.py migrate --noinput &&
        echo '🧪 Running test suite...' &&
        pytest tests/
          --tb=short
          --cov=apps
          --cov-report=term-missing
          --cov-report=html:/app/htmlcov
          --cov-fail-under=70
          -v
          --no-header
      "
    depends_on:
      test-db:
        condition: service_healthy
      test-redis:
        condition: service_healthy
    networks:
      - test-net

networks:
  test-net:
    driver: bridge
    name: kolliq-test-network